# Minimal Prometheus configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "backend-api"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "soundverse-api"
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          service: "node-exporter"
