services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: SoundVerse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: soundverse
      MYSQL_USER: soundverse
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - SoundVerse-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: SoundVerse-redis
    ports:
      - "63792:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - SoundVerse-network

  # 后端API服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: SoundVerse-api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=mysql+aiomysql://soundverse:password@mysql:3306/soundverse
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MAX_SEGMENT_DURATION=8.0
      - MIN_SEGMENT_DURATION=2.0
      - SIMILARITY_THRESHOLD=0.25
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - SoundVerse-network

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: SoundVerse-celery-worker
    depends_on:
      - redis
      - mysql
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=mysql+aiomysql://soundverse:password@mysql:3306/soundverse
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MAX_SEGMENT_DURATION=8.0
      - MIN_SEGMENT_DURATION=2.0
      - SIMILARITY_THRESHOLD=0.25
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    networks:
      - SoundVerse-network

  # Celery Beat (定时任务)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: SoundVerse-celery-beat
    depends_on:
      - redis
      - mysql
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=mysql+aiomysql://soundverse:password@mysql:3306/soundverse
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MAX_SEGMENT_DURATION=8.0
      - MIN_SEGMENT_DURATION=2.0
      - SIMILARITY_THRESHOLD=0.25
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: celery -A tasks.celery_app beat --loglevel=info
    networks:
      - SoundVerse-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: SoundVerse-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./backend/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - SoundVerse-network

  # Admin管理后台
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: SoundVerse-admin
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - SoundVerse-network

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  SoundVerse-network:
    driver: bridge